<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Contact | Jacob Arnold</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --muted: #6b7280; --light-bg: #f9f9f7; --border: #e5e5e0; }
    body { font-family: 'DM Sans', sans-serif; background: #fff; color: #1a1a1a; }
    h1,h2 { font-family: 'Playfair Display', serif; }
    .navbar { background: #fff; border-bottom: 1px solid var(--border); padding: 1.2rem 0; }
    .navbar-brand { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #1a1a1a !important; }
    .nav-link { color: var(--muted) !important; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    .nav-link:hover, .nav-link.active { color: #1a1a1a !important; }
    .page-header { padding: 5rem 0 3rem; border-bottom: 1px solid var(--border); }
    .page-header .label { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }
    .contact-block { padding: 4rem 0; }
    .contact-option { display: flex; align-items: flex-start; gap: 1.25rem; padding: 1.75rem; border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: #1a1a1a; transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 1rem; }
    .contact-option:hover { border-color: #aaa; box-shadow: 0 4px 20px rgba(0,0,0,0.05); color: #1a1a1a; }
    .contact-icon { width: 44px; height: 44px; background: var(--light-bg); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .contact-icon i { font-size: 1.1rem; color: var(--muted); }
    .contact-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.2rem; }
    .contact-value { font-size: 0.95rem; font-weight: 500; }
    footer { padding: 2rem 0; border-top: 1px solid var(--border); }
    footer p { color: var(--muted); font-size: 0.85rem; margin: 0; }
  </style>
</head>
<body>
 
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">Jacob Arnold</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">

    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-3">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="resume.html">Résumé</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="suits.html">Scratch Page</a></li>
      </ul>
    </div>
  </div>
</nav>
 
<div class="page-header">
  <div class="container">
    <p class="label">Get in touch</p>
    <h1>Let's connect.</h1>
  </div>
</div>
 
<div class="contact-block">
  <div class="container">
    <div class="row">
      <div class="col-lg-5">
        <p style="color:var(--muted);line-height:1.8;margin-bottom:2.5rem;">
          Best way to reach me is email. I'm also on GitHub if you want to see what I've been working on.
        </p>
        <a href="mailto:jsarnold373@gmail.com" class="contact-option">
          <div class="contact-icon"><i class="bi bi-envelope"></i></div>
          <div>
            <p class="contact-label">Email</p>
            <p class="contact-value">jsarnold373@gmail.com</p>
          </div>
        </a>
        <a href="https://github.com/WickedWicket373" target="_blank" class="contact-option">
          <div class="contact-icon"><i class="bi bi-github"></i></div>
          <div>
            <p class="contact-label">GitHub</p>
            <p class="contact-value">github.com/WickedWicket373</p>
          </div>
        </a>
      </div>
    </div>
  </div>
</div>
 
<footer><div class="container"><p>© 2025 Jacob Arnold</p></div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
